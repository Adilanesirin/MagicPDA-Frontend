buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 24            // Changed from 21 to 24
        compileSdkVersion = 34
        targetSdkVersion = 34
        kotlinVersion = "2.1.20"
        kspVersion = "2.1.20-2.0.1"
        
        androidGradlePluginVersion = "8.2.1"
        reactNativeGradlePluginVersion = "0.73.0"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:$androidGradlePluginVersion")
        classpath("com.facebook.react:react-native-gradle-plugin:$reactNativeGradlePluginVersion")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"